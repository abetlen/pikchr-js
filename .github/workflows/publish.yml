name: Publish to npm

on:
  release:
    types:
      - published

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    if: github.repository == 'abetlen/pikchr-js'
    runs-on: ubuntu-latest
    environment: npm-publish

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"

          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${package_version}."
            echo "Expected tag ${expected_tag}."
            exit 1
          fi

      - name: Verify package version is unpublished
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} is already published."
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish
